services:
  app:
    build:
      context: .
    container_name: invoice_archiver
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: sqlite:////data/invoices.db
      STORAGE_ROOT: /data
      # 可选 LLM 兜底：填入本地 Ollama 地址即启用，留空则纯正则解析。
      LLM_BASE_URL: ""
      # LLM_MODEL: qwen3:14b
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
